body{
    font-family:'Poppins',sans-serif;
    background:#021b33;

}

/* Ocean Background */

.water-bg{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-10;
    overflow:hidden;

    background:
    linear-gradient(
    to bottom,
    #021b33 0%,
    #033860 30%,
    #046b8c 60%,
    #021b33 100%);
}

/* Water Light Reflection */

.water-bg::before{

    content:"";

    position:absolute;
    width:250%;
    height:250%;

    top:-80%;
    left:-80%;

    background:
    repeating-radial-gradient(
    circle at center,
    rgba(255,255,255,0.08) 0px,
    rgba(255,255,255,0.02) 40px,
    transparent 80px);

    animation:waterMove 18s linear infinite;
}

/* Moving Ocean Waves */

.wave{
    position:absolute;

    width:300%;
    height:350px;

    left:-100%;
    bottom:-120px;

    background:
    rgba(0,190,255,0.15);

    border-radius:40%;

    filter:blur(10px);

    animation:waveMove 14s linear infinite;
}

/* Second Wave */

.wave:nth-child(2){

    bottom:-160px;

    opacity:0.5;

    animation-duration:10s;

    background:rgba(0,140,255,0.20);
}

/* Third Wave */

.wave:nth-child(3){

    bottom:-200px;

    opacity:0.3;

    animation-duration:20s;

    background:rgba(0,255,255,0.12);
}

/* Bubble Effect */

.bubble{
    position:absolute;

    bottom:-100px;

    width:25px;
    height:25px;

    background:rgba(255,255,255,0.15);

    border-radius:50%;

    animation:bubble 12s infinite ease-in;
}

/* Bubble Positions */

.bubble:nth-child(4){
    left:10%;
    width:15px;
    height:15px;
    animation-duration:8s;
}

.bubble:nth-child(5){
    left:30%;
    animation-duration:12s;
}

.bubble:nth-child(6){
    left:50%;
    width:18px;
    height:18px;
    animation-duration:10s;
}

.bubble:nth-child(7){
    left:70%;
    animation-duration:14s;
}

.bubble:nth-child(8){
    left:90%;
    width:12px;
    height:12px;
    animation-duration:9s;
}

/* Ocean Movement */

@keyframes waveMove{

    0%{
        transform:translateX(0) rotate(0deg);

@keyframes waterMove{

@keyframes bubble{
